# Copies comments/daily/*.json from bolividob/bibkreyol-comments-data into this repo and pushes.
# Pushes with GITHUB_TOKEN do not chain-start other workflows — we explicitly run the Pages deploy workflow.
#
# Triggers:
#   • schedule — poll upstream every 10 minutes (no secrets required)
#   • workflow_dispatch — manual
#   • repository_dispatch event_type: sync-comments-data — from upstream repo (optional PAT)

name: Sync from bibkreyol-comments-data

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-comments-data]
  schedule:
    - cron: '*/10 * * * *'

concurrency:
  group: sync-from-upstream-comments-data
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch upstream comments/daily
        run: |
          set -euo pipefail
          rm -rf /tmp/upstream
          git clone --depth 1 --branch main \
            https://github.com/bolividob/bibkreyol-comments-data.git /tmp/upstream
          mkdir -p comments/daily
          shopt -s nullglob
          files=(/tmp/upstream/comments/daily/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Upstream bolividob/bibkreyol-comments-data has no comments/daily/*.json"
            exit 1
          fi
          cp -v "${files[@]}" comments/daily/

      - name: Commit and push if changed
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add comments/daily
          if git diff --staged --quiet; then
            echo "No changes — mirror already matches upstream."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Sync comments/daily from bolividob/bibkreyol-comments-data (workflow ${{ github.run_id }})"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger GitHub Pages deploy
        if: steps.sync.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Deploy comments data to GitHub Pages" --ref main
