# GitHub Pages static deploy — same layout as bolividob/bibkreyol-comments-data (Firebase + Cloudflare parity).

name: Deploy comments data to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'comments/daily/**'
      - '_headers'
      - '_routes.json'
      - '.github/workflows/deploy-github-pages.yml'
  workflow_dispatch:

concurrency:
  group: github-pages-bolivido-bibkreyol-comments
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Assemble static site (all daily JSON + index + nojekyll)
        run: |
          set -euo pipefail
          mkdir -p _site/comments/daily
          shopt -s nullglob
          files=(comments/daily/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No comments/daily/*.json files to publish."
            exit 1
          fi
          cp -v "${files[@]}" _site/comments/daily/
          echo '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>BibKreyol comments (bolivido)</title></head><body><p>Static JSON: <code>comments/daily/</code></p></body></html>' > _site/index.html
          : > _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
